<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QA Harness</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Consolas, "SFMono-Regular", monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #111;
        color: #f3efe6;
      }

      .qa-shell {
        display: grid;
        gap: 16px;
        padding: 16px;
      }

      .qa-meta,
      .qa-report {
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        padding: 14px 16px;
      }

      .qa-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
      }

      .qa-pass {
        color: #91f29e;
      }

      .qa-fail {
        color: #ff9088;
      }

      .qa-pending {
        color: #ffe08c;
      }

      #appFrame {
        width: 100%;
        min-height: calc(100vh - 250px);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        background: white;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main class="qa-shell">
      <section class="qa-meta">
        <strong>QA Harness</strong>
        <span id="suiteLabel"></span>
        <span id="modeLabel"></span>
        <span id="statusLabel" class="qa-pending">RUNNING</span>
      </section>
      <iframe id="appFrame" title="App under test"></iframe>
      <section class="qa-report">
        <pre id="report">Inicialitzant proves...</pre>
      </section>
    </main>
    <script type="module" src="qa-harness.js"></script>
  </body>
</html>
