<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compendi de Campanya</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <button
          type="button"
          class="sidebar-toggle"
          data-sidebar-toggle
          aria-label="Fixa o desfes el menu lateral"
          aria-expanded="false"
          title="Menu lateral"
        >
          <span aria-hidden="true"></span>
        </button>
        <div class="sidebar-scroll">
          <div class="sidebar-top">
            <p class="eyebrow">Campanya D&amp;D</p>
            <h1>Compendi de Campanya</h1>
            <p class="sidebar-copy">
              Pergamins, cròniques i memòria viva dels personatges.
            </p>
            <button
              type="button"
              class="sidebar-office-toggle"
              data-toggle-office-mode
              aria-pressed="false"
            >
              Mode oficina
            </button>
            <div class="sidebar-campaign-slot" data-sidebar-campaign-switcher hidden></div>
          </div>

          <nav class="module-nav" aria-label="Mòduls principals" role="tablist">
            <button
              id="module-tab-characters"
              type="button"
              class="module-link active"
              data-module-link="characters"
              role="tab"
              aria-selected="true"
              aria-controls="charactersModule"
            >
              Personatges
            </button>
            <button
              id="module-tab-chronicles"
              type="button"
              class="module-link"
              data-module-link="chronicles"
              role="tab"
              aria-selected="false"
              aria-controls="chroniclesModule"
              tabindex="-1"
            >
              Cròniques
            </button>
            <button
              id="module-tab-glossary"
              type="button"
              class="module-link"
              data-module-link="glossary"
              role="tab"
              aria-selected="false"
              aria-controls="glossaryModule"
              tabindex="-1"
            >
              Glossari
            </button>
            <button
              id="module-tab-campaigns"
              type="button"
              class="module-link"
              data-module-link="campaigns"
              role="tab"
              aria-selected="false"
              aria-controls="campaignsModule"
              tabindex="-1"
            >
              Campanyes
            </button>
            <button
              id="module-tab-options"
              type="button"
              class="module-link"
              data-module-link="options"
              role="tab"
              aria-selected="false"
              aria-controls="optionsModule"
              tabindex="-1"
            >
              Opcions
            </button>
          </nav>
          <div id="sidebarContextPanel" class="sidebar-panel" hidden></div>
        </div>

      </aside>

      <main class="main-content">
        <section id="charactersModule" class="module-view active" role="tabpanel" aria-labelledby="module-tab-characters"></section>
        <section id="chroniclesModule" class="module-view" role="tabpanel" aria-labelledby="module-tab-chronicles" hidden></section>
        <section id="glossaryModule" class="module-view" role="tabpanel" aria-labelledby="module-tab-glossary" hidden></section>
        <section id="campaignsModule" class="module-view" role="tabpanel" aria-labelledby="module-tab-campaigns" hidden></section>
        <section id="optionsModule" class="module-view" role="tabpanel" aria-labelledby="module-tab-options" hidden></section>
      </main>
    </div>
    <div id="saveNotice" class="save-notice" aria-live="polite" aria-atomic="true"></div>
    <div id="authGate" class="auth-gate" data-auth-gate>
      <div class="auth-book" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <h2 id="authTitle" class="sr-only">Obre el segell</h2>
        <div class="auth-sigil-login">
          <div class="auth-wait-ring" aria-hidden="true"></div>
          <div id="googleSignInButton" class="google-signin-button" aria-hidden="true"></div>
          <button type="button" class="auth-sigil-button" data-auth-logo-login aria-label="Obre el segell"></button>
          <p class="auth-status" data-auth-status></p>
        </div>
        <div class="auth-campaign-select" data-auth-campaign-select hidden></div>
      </div>
    </div>
    <input id="richMediaPicker" type="file" data-rich-media-picker hidden />
    <input id="backupImportPicker" type="file" accept=".json,application/json" hidden />
    <div id="quickGlossaryModal" class="quick-glossary-modal" hidden>
      <div class="quick-glossary-backdrop" data-close-quick-glossary></div>
      <div class="quick-glossary-dialog" role="dialog" aria-modal="true" aria-labelledby="quickGlossaryTitle">
        <form data-form="quick-glossary" class="quick-glossary-form">
          <div class="quick-glossary-head">
            <div>
              <p class="eyebrow">Nova referencia</p>
              <h3 id="quickGlossaryTitle">Nova entrada de glossari</h3>
            </div>
            <button type="button" class="secondary" data-close-quick-glossary>Tanca</button>
          </div>
          <label class="field">
            <span>Nom</span>
            <input name="quickGlossaryName" maxlength="120" required />
          </label>
          <label class="field">
            <span>Foto</span>
            <input name="quickGlossaryImage" type="file" accept="image/*" />
            <small class="field-help">La imatge es comprimeix abans de guardar-se.</small>
          </label>
          <label class="field">
            <span>Categoria</span>
            <select name="quickGlossaryCategory">
              <option value="Llocs">Llocs</option>
              <option value="Religió">Religió</option>
              <option value="Antagonistes">Antagonistes</option>
              <option value="Entitats">Entitats</option>
              <option value="Faccions">Faccions</option>
              <option value="Objectes">Objectes</option>
              <option value="Monstres">Monstres</option>
              <option value="Races">Races</option>
              <option value="Altres">Altres</option>
            </select>
          </label>
          <label class="field">
            <span>Descripció breu</span>
            <textarea name="quickGlossaryDescription" rows="4"></textarea>
          </label>
          <div class="quick-glossary-actions">
            <button type="button" class="secondary" data-close-quick-glossary>Cancel·la</button>
            <button type="submit">Crea i enllaça</button>
          </div>
        </form>
      </div>
    </div>
    <div id="imageLightbox" class="image-lightbox" hidden>
      <div class="image-lightbox-backdrop" data-close-image-lightbox></div>
      <div
        class="image-lightbox-dialog"
        role="dialog"
        aria-modal="true"
        aria-label="Visor d'imatge"
      >
        <button
          type="button"
          class="image-lightbox-close"
          data-close-image-lightbox
          aria-label="Tanca la imatge ampliada"
        >
          Tanca
        </button>
        <img id="imageLightboxMedia" class="image-lightbox-media" alt="" />
      </div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
