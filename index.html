<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compendi de Campanya</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <p class="eyebrow">Campanya D&amp;D</p>
          <h1>Compendi de Campanya</h1>
          <p class="sidebar-copy">
            Pergamins, cròniques i memòria viva dels personatges.
          </p>
        </div>

        <nav class="module-nav" aria-label="Mòduls principals">
          <button type="button" class="module-link active" data-module-link="characters">
            Personatges
          </button>
          <button type="button" class="module-link" data-module-link="chronicles">
            Cròniques
          </button>
          <button type="button" class="module-link" data-module-link="glossary">
            Glossari
          </button>
        </nav>
      </aside>

      <main class="main-content">
        <section id="charactersModule" class="module-view active"></section>
        <section id="chroniclesModule" class="module-view"></section>
        <section id="glossaryModule" class="module-view"></section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
