<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capture Harness</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #120d0a;
      }

      body[data-capture-ready="false"]::before {
        content: "Preparant captura...";
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #f7ead5;
        font: 600 16px Georgia, "Times New Roman", serif;
        background: #120d0a;
        z-index: 1;
      }

      #appFrame {
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
        background: #120d0a;
      }
    </style>
  </head>
  <body data-capture-ready="false">
    <iframe id="appFrame" title="App capture frame"></iframe>
    <script type="module" src="capture-harness.js"></script>
  </body>
</html>
